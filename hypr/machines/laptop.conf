# Laptop-specific Hyprland config (ThinkPad T14s Gen3)
# This file is sourced AFTER the main config, so it overrides settings

################
### MONITOR ###
################
monitor = eDP-1,1920x1200@60,0x0,1

#############
### INPUT ###
#############
# Laptop input with touchpad settings
input {
    kb_layout = us
    repeat_rate = 100
    repeat_delay = 300
    follow_mouse = 1
    natural_scroll = true
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 1.0
        tap-to-click = true
        disable_while_typing = true
    }
}

###################
### MY PROGRAMS ###
###################
# Override Discord without --disable-gpu (laptop has better GPU support)
bind = Super, D, exec, discord --enable-features=UseOzonePlatform,WebRTCPipeWireCapturer --ozone-platform=wayland

####################
### BRIGHTNESS ###
####################
# ThinkPad T14s brightness controls with mako notifications
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && notify-send -h string:x-canonical-private-synchronous:brightness "Brightness" "$(brightnessctl -m | cut -d',' -f4)" -t 1000
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -h string:x-canonical-private-synchronous:brightness "Brightness" "$(brightnessctl -m | cut -d',' -f4)" -t 1000
