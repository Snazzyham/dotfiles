# Desktop-specific Hyprland config
# This file is sourced AFTER the main config, so it overrides settings

################
### MONITOR ###
################
# Use preferred/auto settings (already in base config, but explicit here)
monitor = ,preferred,auto,auto

###################
### MY PROGRAMS ###
###################
# Override Discord with --disable-gpu for desktop
bind = Super, D, exec, discord --enable-features=UseOzonePlatform,WebRTCPipeWireCapturer --ozone-platform=wayland --disable-gpu
