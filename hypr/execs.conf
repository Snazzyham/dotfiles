exec-once = hyrpctl dispatch dpms on

# notifications and bar
exec-once = mako
exec-once = waybar

# clipboard 
exec-once = wl-paste --watch cliphist store

# use kitty for floating terminal
windowrule = float on, match:class ^(kitty)$
windowrule = float on, match:class com.gabm.satty
windowrule = size 1400 900, match:class ^(kitty)$

# float nautilus preview
windowrule = float on, match:class ^(org.gnome.NautilusPreviewer)$
windowrule = center on, match:class ^(org.gnome.NautilusPreviewer)$

# core components
exec-once = gnome-keyring-daemon --start --components=secrets
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = swayidle -w 
