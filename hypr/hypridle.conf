# Hypridle configuration
# Replaces swayidle with proper Hyprland integration
# Timeouts: 15min DPMS, 30min lock+kill Discord, 4hr suspend

# Lock command using hyprlock (fallback-safe)
$lock_cmd = pidof hyprlock || hyprlock

# Suspend command
$suspend_cmd = systemctl suspend

# Script to kill Discord and lock
$lock_and_kill_discord = bash -c 'killall Discord 2>/dev/null; pidof hyprlock || hyprlock'

general {
    # Command to run when locking (e.g., via loginctl lock-session)
    lock_cmd = $lock_cmd
    
    # Command to run before going to sleep (critical for preventing "lock died" error)
    before_sleep_cmd = loginctl lock-session
    
    # Ignore idle inhibitors for listeners that should always run
    ignore_dbus_inhibit = false
    
    # Lock on screen timeout even with inhibitors
    ignore_systemd_inhibit = false
}

# Listener 1: Turn off displays after 15 minutes (900 seconds)
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Listener 2: Lock screen (and kill Discord) after 30 minutes (1800 seconds)
listener {
    timeout = 1800
    on-timeout = $lock_and_kill_discord
}

# Listener 3: Suspend after 4 hours (14400 seconds)
listener {
    timeout = 14400
    on-timeout = $suspend_cmd
}
