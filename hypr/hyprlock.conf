# Hyprlock configuration with theme integration
# Theme: night-owl - Auto-generated by theme-apply.fish

# Source theme colors (will be available as $theme_* variables)
source = ~/.config/hypr/themes/current.conf

# Font configuration
$font_family = Inter V
$font_family_clock = Inter V
$font_material_symbols = Material Symbols Rounded

# Derived colors from theme
$text_color = $theme_fg
$entry_background_color = $theme_bg
$entry_border_color = $theme_medium
$entry_color = $theme_fg
$ring_color = $theme_medium
$ring_ver_color = $theme_light
$ring_wrong_color = rgb(ef5350)  # Error color from night-owl
$ring_clear_color = $theme_dark

background {
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $ring_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>Enter password</i>
    hide_input = false
    rounding = 10
    check_color = $ring_ver_color
    fail_color = $ring_wrong_color
    capslock_color = $ring_clear_color
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_capslock = false
    position = 0, 20
    halign = center
    valign = center
}

label {
    text = $TIME
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 65
    font_family = $font_family_clock
    position = 0, 300
    halign = center
    valign = center
}

label {
    text = Hello, $USER
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 20
    font_family = $font_family
    position = 0, 240
    halign = center
    valign = center
}

label {
    text = lock
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 21
    font_family = $font_material_symbols
    position = 0, 65
    halign = center
    valign = bottom
}

label {
    text = Session Locked
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 0, 45
    halign = center
    valign = bottom
}

label {
    text = cmd[update:1000] date +"%A, %B %d"
    shadow_passes = 1
    shadow_boost = 0.5
    color = $theme_light
    font_size = 18
    font_family = $font_family
    position = 0, 150
    halign = center
    valign = center
}
