##! Apps
bind = Super, D, exec, discord # Launch Discord 
# bind = Super, F, exec, env GTK_THEME=Adwaita:dark nautilus # Launch Nautilus (file manager)
bind = Super, F, exec, pcmanfm
bind = Super, M, exec, kitty btop
# bind = Super, B, exec, flatpak run io.github.zen_browser.zen # Launch Zen (browser)
bind = Super, B, exec, zen-browser
bind = Super, Return, exec, foot
bind = Super, space, exec, ~/.config/fuzzel/launcher.sh
bind = Super, n, exec, wezterm -e nvim ~/Documents/notes/$(date +'%Y-%m-%d_%H-%M-%S').md +"startinsert"
bind = Alt, space, exec, rofi -show drun
bind = Alt, S, exec, rofi -show ssh
bind = Alt, Tab, exec, rofi -show window
bind = Alt, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
