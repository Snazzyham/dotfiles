# bind = Super SHIFT,T,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract -l eng "tmp.png" - | wl-copy && rm "tmp.png" # Screen snip to text >> clipboard
# bind = Ctrl Super SHIFT,S,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png" # [hidden]
# Color picker
bind = Super SHIFT, C, exec, hyprpicker -a # Pick color (Hex) >> clipboard
# Fullscreen screenshot
bindl=,Print,exec,hyprshot # Screenshot >> clipboard
# bind = Super, L, exec, wlogout # Lock
bind = Super, L, exec, ~/.config/rofi/power-menu.sh

##! Window management
# Focusing
#/# bind = Super, ←/↑/→/↓,, # Move focus in direction
bind = ALT, h, movefocus, l # [hidden]
bind = ALT, l, movefocus, r # [hidden]
bind = ALT, k, movefocus, u # [hidden]
bind = ALT, j, movefocus, d # [hidden]
bind = ALT, BracketLeft, movefocus, l # [hidden]
bind = ALT, BracketRight, movefocus, r # [hidden]
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bind = Super, Q, killactive,
##! Window arrangement
#/# bind = Super SHIFT, ←/↑/→/↓,, # Window: move in direction
bind = ALT SHIFT, h, movewindow, l # [hidden]
bind = ALT SHIFT, l, movewindow, r # [hidden]
bind = ALT SHIFT, k, movewindow, u # [hidden]
bind = ALT SHIFT, j, movewindow, d # [hidden]
# Window split ratio
#/# binde = Super, +/-,, # Window: split ratio +/- 0.1
binde = Super, Minus, splitratio, -0.1 # [hidden]
binde = Super, Equal, splitratio, +0.1 # [hidden]
binde = Super, Semicolon, splitratio, -0.1 # [hidden]
binde = Super, Apostrophe, splitratio, +0.1 # [hidden]
# Positioning mode
bind = Super+ALT, Space, togglefloating,
bind = ALT, F, fullscreen, 1 # Toggle fake fullscreen

