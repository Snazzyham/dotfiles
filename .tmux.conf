set -g mouse on
set-option -g allow-rename on
set -g default-terminal "xterm-256color"
set-option -sa terminal-overrides ",xterm-256color*:Tc"
set-option -g prefix C-x
set-option -g status-position top

if-shell "uname | grep -q Darwin" {
  set -g default-shell /opt/homebrew/bin/fish
} {
  set -g default-shell /usr/bin/fish
}


# Tmux Navigator Keybindings
# Navigate between vim and tmux panes seamlessly
# Improved Tmux Navigator Keybindings
is_vim='ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "(vim|nvim)"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"


# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Vi copypaste mode
set-window-option -g mode-keys vi

bind > split-window -h -c "#{pane_current_path}"
bind < split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %


#
## statusbar
set -g status-position bottom
set -g status-justify left
#below needed for tokyo-night
#set -g status-bg '#414868'



bind r source-file ~/.tmux.conf

