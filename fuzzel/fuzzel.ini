# ~/.config/fuzzel/fuzzel.ini

[main]
font = JetBrainsMono Nerd Font:size=14
prompt = "❯ "
dpi-aware = true
lines = 10
horizontal-pad = 60
vertical-pad = 60
inner-pad = 12
icon-theme = "Papirus-Dark"
terminal = foot
anchor = center
width = 50
line-height = 28
exit-on-keyboard-focus-loss = true
layer = overlay

[colors]
background = 0D1B1Eee
text = F6FFF8ff
match = CCE3DEff
selection = 6B9080ff
selection-text = CCE3DEff
border = A4C3B2ff
separator = 6B9080ff

[border]
width = 2
radius = 6

[scroll]
indicator = true
indicator-position = right
