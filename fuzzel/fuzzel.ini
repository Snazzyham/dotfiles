# ~/.config/fuzzel/fuzzel.ini

[main]
font = JetBrainsMono Nerd Font:size=14
prompt = "❯ "
dpi-aware = true
lines = 10
horizontal-pad = 60
vertical-pad = 60
inner-pad = 12
icon-theme = "Papirus-Dark"
terminal = foot
anchor = center
width = 50
line-height = 28
exit-on-keyboard-focus-loss = true
layer = overlay

[colors]
background = 1d2021ee
text = ebdbb2ff
match = fe8019ff
selection = 3c3836ff
selection-text = fe8019ff
border = 7c6f64ff
separator = 3c3836ff

[border]
width = 2
radius = 6

[scroll]
indicator = true
indicator-position = right
