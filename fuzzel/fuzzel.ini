# ~/.config/fuzzel/fuzzel.ini

[main]
font = JetBrainsMono Nerd Font:size=14
prompt = "❯ "
dpi-aware = true
lines = 10
horizontal-pad = 60
vertical-pad = 60
inner-pad = 12
icon-theme = "Papirus-Dark"
terminal = foot
anchor = center
width = 50
line-height = 28
exit-on-keyboard-focus-loss = true
layer = overlay

[colors]
background = 1d1f21ee         # base00 with transparency
text = c5c8c6ff               # base05
match = f0c674ff              # base0A (soft yellow highlight)
selection = 373b41ff          # base02 (selection background)
selection-text = f0c674ff     # base0A (selected text)
border = 5f819dff             # base0D (subtle border)
separator = 282a2eff          # base01 (between entries)

[border]
width = 2
radius = 6

[scroll]
indicator = true
indicator-position = right
