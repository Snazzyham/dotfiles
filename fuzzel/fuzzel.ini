# ~/.config/fuzzel/fuzzel.ini

[main]
font = JetBrainsMono Nerd Font:size=14
prompt = "❯ "
dpi-aware = true
lines = 10
horizontal-pad = 60
vertical-pad = 60
inner-pad = 12
icon-theme = "Papirus-Dark"
terminal = foot
anchor = center
width = 50
line-height = 28
exit-on-keyboard-focus-loss = true
layer = overlay

[colors]
background = 1f1f28ee
text = dcd7baff
match = 7fb4caff
selection = 2a2a37ff
selection-text = 7fb4caff
border = 727169ff
separator = 2a2a37ff

[border]
width = 2
radius = 6

[scroll]
indicator = true
indicator-position = right
