# Dracula - The most famous dark theme ever created
# Dark theme with vibrant accent colors

# Core palette (REQUIRED)
bg=282a36
fg=f8f8f2
dark=44475a
medium=6272a4
light=bd93f9

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ff5555
warning=f1fa8c
success=50fa7b

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ff5555
green=50fa7b
yellow=f1fa8c
blue=$light
magenta=ff79c6
cyan=8be9fd
white=$fg
bright_black=$dark
bright_red=ff5555
bright_green=50fa7b
bright_yellow=f1fa8c
bright_blue=bd93f9
bright_magenta=ff79c6
bright_cyan=8be9fd
bright_white=ffffff
