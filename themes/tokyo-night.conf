# Tokyo Night - A clean dark theme celebrating Tokyo's night lights
# Dark theme with purple-blue tones inspired by Tokyo at night

# Core palette (REQUIRED)
bg=1a1b26
fg=c0caf5
dark=292e42
medium=565f89
light=7aa2f7

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=f7768e
warning=e0af68
success=9ece6a

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=f7768e
green=9ece6a
yellow=e0af68
blue=$light
magenta=bb9af7
cyan=7dcfff
white=$fg
bright_black=$dark
bright_red=ff7799
bright_green=9ece6a
bright_yellow=e0af68
bright_blue=7aa2f7
bright_magenta=bb9af7
bright_cyan=7dcfff
bright_white=ffffff
