# Iceberg - A cool, dark theme for Vim
# A cool, dark color scheme inspired by ice and ocean

# Core palette (REQUIRED)
bg=161821
fg=c6c8d1
dark=262a3f
medium=6b7089
light=84a0c6

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=e27878
warning=e2a478
success=b4be82

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=e27878
green=b4be82
yellow=e2a478
blue=$light
magenta=a093c7
cyan=89b8c2
white=$fg
bright_black=$dark
bright_red=e27878
bright_green=b4be82
bright_yellow=e2a478
bright_blue=84a0c6
bright_magenta=a093c7
bright_cyan=89b8c2
bright_white=ffffff
