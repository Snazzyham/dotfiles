# Catppuccin Macchiato - A mid-contrast dark theme with gentle colors
# Medium contrast variant with softer pastels

# Core palette (REQUIRED)
bg=24273a
fg=cad3f5
dark=363a4f
medium=8087a2
light=b7bdf8

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ed8796
warning=eed49f
success=a6da95

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ed8796
green=a6da95
yellow=eed49f
blue=$light
magenta=c6a0f6
cyan=8bd5ca
white=$fg
bright_black=$dark
bright_red=ff7799
bright_green=a6da95
bright_yellow=eed49f
bright_blue=b7bdf8
bright_magenta=c6a0f6
bright_cyan=8bd5ca
bright_white=ffffff
