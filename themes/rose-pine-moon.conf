# Rose Pine Moon - Darker variant of Rosé Pine
# A darker, more muted take on the elegant Rosé Pine

# Core palette (REQUIRED)
bg=232136
fg=e0def4
dark=2a273f
medium=908caa
light=c4a7e7

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=eb6f92
warning=f6c177
success=3e8fb0

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=eb6f92
green=3e8fb0
yellow=f6c177
blue=9ccfd8
magenta=c4a7e7
cyan=ea9a97
white=$fg
bright_black=$dark
bright_red=eb6f92
bright_green=3e8fb0
bright_yellow=f6c177
bright_blue=9ccfd8
bright_magenta=c4a7e7
bright_cyan=ea9a97
bright_white=ffffff
