# Gruvbox Dark Hard - Retro groove dark theme with hard contrast
# Warm colors inspired by retro groove with high contrast

# Core palette (REQUIRED)
bg=1d2021
fg=ebdbb2
dark=3c3836
medium=7c6f64
light=fe8019

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=fb4934
warning=fabd2f
success=b8bb26

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=fb4934
green=b8bb26
yellow=fabd2f
blue=83a598
magenta=d3869b
cyan=8ec07c
white=$fg
bright_black=$dark
bright_red=fb4934
bright_green=b8bb26
bright_yellow=fabd2f
bright_blue=83a598
bright_magenta=d3869b
bright_cyan=8ec07c
bright_white=fbf1c7
