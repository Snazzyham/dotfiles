# Moonfly - Deep space dark theme
# A dark theme with vibrant terminal colors

# Core palette (REQUIRED)
bg=080808
fg=b2b2b2
dark=323437
medium=949494
light=80a0ff

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ff5454
warning=e3c78a
success=8cc85f

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ff5454
green=8cc85f
yellow=e3c78a
blue=$light
magenta=cf87e8
cyan=79dac8
white=$fg
bright_black=$dark
bright_red=ff5454
bright_green=8cc85f
bright_yellow=e3c78a
bright_blue=80a0ff
bright_magenta=cf87e8
bright_cyan=79dac8
bright_white=ffffff
