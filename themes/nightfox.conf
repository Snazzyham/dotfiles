# Nightfox - A soft, dark, fully customizable Neovim theme
# Soft dark theme with warm blue-grey tones

# Core palette (REQUIRED)
bg=192330
fg=cdcecf
dark=212e3f
medium=71839b
light=86abdc

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=c94f6d
warning=f4a261
success=81b29a

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=c94f6d
green=81b29a
yellow=dbc074
blue=$light
magenta=b4b4ce
cyan=63cdcf
white=$fg
bright_black=$dark
bright_red=c94f6d
bright_green=81b29a
bright_yellow=dbc074
bright_blue=86abdc
bright_magenta=b4b4ce
bright_cyan=63cdcf
bright_white=ffffff
