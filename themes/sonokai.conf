# Sonokai - A high-contrast dark theme based on Monokai
# Modern high-contrast dark theme with vibrant colors

# Core palette (REQUIRED)
bg=2c2e34
fg=e2e2e3
dark=33353f
medium=7f8490
light=76cce0

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=fc5d7c
warning=f39660
success=9ed072

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=fc5d7c
green=9ed072
yellow=f39660
blue=$light
magenta=b39df3
cyan=7cd8c6
white=$fg
bright_black=$dark
bright_red=fc5d7c
bright_green=9ed072
bright_yellow=f39660
bright_blue=76cce0
bright_magenta=b39df3
bright_cyan=7cd8c6
bright_white=ffffff
