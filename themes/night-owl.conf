# Night Owl - A VS Code dark theme optimized for night owls
# Dark blue theme designed for low-light conditions

# Core palette (REQUIRED)
bg=011627
fg=d6deeb
dark=1d3b53
medium=7e57c2
light=82aaff

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ef5350
warning=ffca28
success=addb67

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ef5350
green=addb67
yellow=ffca28
blue=$light
magenta=c792ea
cyan=80cbc4
white=$fg
bright_black=$dark
bright_red=ef5350
bright_green=addb67
bright_yellow=ffca28
bright_blue=82aaff
bright_magenta=c792ea
bright_cyan=80cbc4
bright_white=ffffff
