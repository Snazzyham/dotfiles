# Catppuccin Mocha - A soothing pastel dark theme
# A dark theme with beautiful pastel colors from the Catppuccin palette

# Core palette (REQUIRED)
bg=1e1e2e
fg=cdd6f4
dark=313244
medium=7f849c
light=b4befe

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=f38ba8
warning=f9e2af
success=a6e3a1

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=f38ba8
green=a6e3a1
yellow=f9e2af
blue=$light
magenta=cba6f7
cyan=94e2d5
white=$fg
bright_black=$dark
bright_red=ff7799
bright_green=a6e3a1
bright_yellow=f9e2af
bright_blue=b4befe
bright_magenta=cba6f7
bright_cyan=94e2d5
bright_white=ffffff
