# Kanagawa - A theme inspired by traditional Japanese paintings
# Dark theme with beautiful Japanese-inspired colors

# Core palette (REQUIRED)
bg=1f1f28
fg=dcd7ba
dark=2a2a37
medium=727169
light=7fb4ca

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ff5d62
warning=ffa066
success=98bb6c

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ff5d62
green=98bb6c
yellow=e6c384
blue=7fb4ca
magenta=957fb8
cyan=7aa89f
white=$fg
bright_black=$dark
bright_red=ff5d62
bright_green=98bb6c
bright_yellow=e6c384
bright_blue=7fb4ca
bright_magenta=957fb8
bright_cyan=7aa89f
bright_white=dcd7ba
