# Nord - An arctic, north-bluish color palette
# Clean, minimal, and arctic-inspired dark theme

# Core palette (REQUIRED)
bg=2e3440
fg=d8dee9
dark=434c5e
medium=81a1c1
light=88c0d0

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=bf616a
warning=ebcb8b
success=a3be8c

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=bf616a
green=a3be8c
yellow=ebcb8b
blue=$light
magenta=b48ead
cyan=8fbcbb
white=$fg
bright_black=$dark
bright_red=bf616a
bright_green=a3be8c
bright_yellow=ebcb8b
bright_blue=88c0d0
bright_magenta=b48ead
bright_cyan=8fbcbb
bright_white=eceff4
