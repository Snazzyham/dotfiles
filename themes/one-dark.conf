# One Dark - Atom's iconic dark theme
# Clean, modern dark theme from the Atom editor

# Core palette (REQUIRED)
bg=282c34
fg=abb2bf
dark=3e4451
medium=5c6370
light=528bff

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=e06c75
warning=d19a66
success=98c379

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=e06c75
green=98c379
yellow=d19a66
blue=$light
magenta=c678dd
cyan=56b6c2
white=$fg
bright_black=$dark
bright_red=e06c75
bright_green=98c379
bright_yellow=d19a66
bright_blue=528bff
bright_magenta=c678dd
bright_cyan=56b6c2
bright_white=ffffff
