# Soft Lavender
# A dreamy twilight palette with dusky indigo, soft mauve, smoky plum, blush beige, and creamy white

# Core palette (REQUIRED)
bg=22223B
fg=F2E9E4
dark=4A4E69
medium=B8AEB5
light=C9ADA7

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=D4A5A5
warning=D4C4A8
success=A8B5A0

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=D4A5A5
green=A8B5A0
yellow=D4C4A8
blue=7A8BA3
magenta=B8A0B0
cyan=A8C4C0
white=$fg
bright_black=$dark
bright_red=E0B0B0
bright_green=B8C4B0
bright_yellow=E0D4B8
bright_blue=8A9BB3
bright_magenta=C8B0C0
bright_cyan=B8D4D0
bright_white=FFFFFF
