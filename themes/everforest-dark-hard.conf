# Everforest Dark Hard - Comfortable forest dark theme with hard contrast
# Green-based warm dark theme with high contrast

# Core palette (REQUIRED)
bg=1e2326
fg=d3c6aa
dark=374145
medium=859289
light=a7c080

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=e67e80
warning=dbbc7f
success=a7c080

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=e67e80
green=a7c080
yellow=dbbc7f
blue=7fbbb3
magenta=d699b6
cyan=83c092
white=$fg
bright_black=$dark
bright_red=e67e80
bright_green=a7c080
bright_yellow=dbbc7f
bright_blue=7fbbb3
bright_magenta=d699b6
bright_cyan=83c092
bright_white=f3ead3
