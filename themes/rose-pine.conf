# Rose Pine Main - All natural pine, faux fur and a bit of soho vibes
# Elegant dark theme with muted pastel colors

# Core palette (REQUIRED)
bg=191724
fg=e0def4
dark=26233a
medium=908caa
light=c4a7e7

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=eb6f92
warning=f6c177
success=31748f

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=eb6f92
green=31748f
yellow=f6c177
blue=9ccfd8
magenta=c4a7e7
cyan=ebbcba
white=$fg
bright_black=$dark
bright_red=eb6f92
bright_green=31748f
bright_yellow=f6c177
bright_blue=9ccfd8
bright_magenta=c4a7e7
bright_cyan=ebbcba
bright_white=ffffff
