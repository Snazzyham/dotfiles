# HamBlue Theme
# A cool blue-grey theme with black background

# Core palette (5 colors)
bg=000000
fg=F4F4F9
dark=2F4550
medium=577787
light=B8DBD9

# Semantic aliases (optional overrides)
# These default to core palette if not set
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=E06C75
warning=E5C07B
success=98C379

# Terminal colors (base16-style)
# If not defined, generated from core palette
black=$bg
red=CC6666
green=98C379
yellow=E5C07B
blue=$medium
magenta=B294BB
cyan=$light
white=$fg
bright_black=$dark
bright_red=D54E53
bright_green=B9CA4A
bright_yellow=E7C547
bright_blue=7AA6DA
bright_magenta=C397D8
bright_cyan=70C0B1
bright_white=FFFFFF
