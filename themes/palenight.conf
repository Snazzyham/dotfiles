# Palenight - A deep, muted purple-based theme
# Dark theme with muted purple and blue accents

# Core palette (REQUIRED)
bg=292d3e
fg=959dcb
dark=444267
medium=676e95
light=82aaff

# Semantic aliases (optional - defaults to core)
accent=$light
border_active=$light
border_inactive=$dark
text=$fg
text_dim=$medium
surface=$dark
error=ff5370
warning=ffcb6b
success=c3e88d

# Terminal colors (REQUIRED for foot/nvim terminal)
black=$bg
red=ff5370
green=c3e88d
yellow=ffcb6b
blue=$light
magenta=f07178
cyan=89ddff
white=$fg
bright_black=$dark
bright_red=ff5370
bright_green=c3e88d
bright_yellow=ffcb6b
bright_blue=82aaff
bright_magenta=f07178
bright_cyan=89ddff
bright_white=ffffff
